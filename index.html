<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytical Chess - 4 Player Teams</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        /* CSS GOES HERE */
        :root { --bg: #0d1117; --text: #e6edf3; --box: #161b22; --accent: #388bfd; --border: #30363d; --team-accent: #238636; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; text-align: center; }
        #setup-section { background: var(--box); border: 1px solid var(--border); padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        #board { border: 5px solid #21262d; border-radius: 4px; margin: auto; }
        .game-layout { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 20px; }
        .sidebar-container { width: 350px; display: flex; flex-direction: column; gap: 15px; }
        .chat-section { background: var(--box); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; height: 280px; }
        .team-chat-box { border: 2px solid var(--team-accent); }
        #chat-messages, #team-messages { flex-grow: 1; overflow-y: auto; padding: 10px; text-align: left; font-size: 14px; }
        .chat-input-area { display: flex; border-top: 1px solid var(--border); }
        input { flex-grow: 1; padding: 10px; background: transparent; color: white; border: none; outline: none; }
        button { padding: 8px 12px; cursor: pointer; background: var(--accent); color: white; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Strategy Hub: 4-Player Teams</h2>
        <div id="setup-section">
            <input type="text" id="roomInput" placeholder="Enter Room ID">
            <button onclick="joinRoom('w')">White</button>
            <button onclick="joinRoom('g')">Gold</button>
            <button onclick="joinRoom('b')">Black</button>
            <button onclick="joinRoom('s')">Silver</button>
        </div>
        <div class="game-layout">
            <div id="board" style="width: 450px;"></div>
            <div class="sidebar-container">
                <div class="chat-section"><h3>Public</h3><div id="chat-messages"></div><div class="chat-input-area"><input id="chatInput"><button onclick="sendMessage('global')">Send</button></div></div>
                <div class="chat-section team-chat-box"><h3>Team</h3><div id="team-messages"></div><div class="chat-input-area"><input id="teamInput"><button onclick="sendMessage('team')">Send</button></div></div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script>
        // PASTE YOUR SCRIPT.JS CODE HERE 
        // (Make sure to update your firebaseConfig!)
    </script>
</body>
</html>
