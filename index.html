<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytical Chess - 4 Player Teams</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-over-modal" class="modal">
        <div class="modal-content">
            <h2 id="winner-text">Game Over</h2>
            <p id="reason-text"></p>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>

    <div class="container">
        <h2>Strategy Hub: 4-Player Teams</h2>
        
        <div id="setup-section">
            <input type="text" id="roomInput" placeholder="Enter Room ID (e.g. 123)">
            <div style="margin-top:15px; display: flex; justify-content: center; gap: 20px;">
                <div>
                    <p><strong>Team A</strong></p>
                    <button onclick="joinRoom('w')">Join White</button>
                    <button onclick="joinRoom('g')">Join Gold</button>
                </div>
                <div>
                    <p><strong>Team B</strong></p>
                    <button onclick="joinRoom('b')">Join Black</button>
                    <button onclick="joinRoom('s')">Join Silver</button>
                </div>
            </div>
        </div>

        <div class="game-layout">
            <div class="board-container">
                <div id="board" style="width: 450px;"></div>
                <div class="controls" style="margin-top:15px;">
                    <button id="theme-toggle" onclick="toggleTheme()">🌙 Theme</button>
                    <button id="flip-toggle" onclick="flipBoard()">🔄 Flip</button>
                </div>
                <p id="status">Please enter a Room ID and pick a side.</p>
            </div>
            
            <div class="sidebar-container">
                <div class="chat-section">
                    <h3 style="padding: 10px 0 0 10px; margin: 0;">Public Chat</h3>
                    <div id="chat-messages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chatInput" placeholder="Message everyone...">
                        <button onclick="sendMessage('global')">Send</button>
                    </div>
                </div>

                <div class="chat-section team-chat-box">
                    <h3 style="padding: 10px 0 0 10px; margin: 0;">Team Strategy (Private)</h3>
                    <div id="team-messages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="teamInput" placeholder="Message partner...">
                        <button onclick="sendMessage('team')">Discuss</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
